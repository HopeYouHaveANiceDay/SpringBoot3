<ng-container *ngIf="(invoicesState$ | async) as state" [ngSwitch]="state.dataState">
    <ng-container *ngSwitchCase="DataState.LOADED">
       <app-navbar [user]="state?.appData?.data?.user"></app-navbar>
       <section>
          <div class="container">
            <nav aria-label="breadcrumb" style="margin-top: 8px;">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"> <a [routerLink]="['/']">Home</a> </li>
                   <li class="breadcrumb-item active"> Invoices </li>
                </ol>
             </nav>
             <div class="row mt-3">
                <div class="col">
                   <h4 class="fw-bold text-start">Invoices</h4>
                </div>
                <div class="col">
                   <h4 class="fw-bold text-end"><i style="cursor: pointer;color: green;font-size: 30px;" class="bi bi-file-earmark-excel"></i></h4>
                </div>
                <div class="col-xm-12">
                   <table class="table table-hover">
                      <thead class="table-secondary">
                          <tr>
                           <th scope="col">Invoice Number</th>
                           <th scope="col">Service</th>
                           <th scope="col">Status</th>
                           <th scope="col">Date</th>
                           <th scope="col">Total</th>
                           <th scope="col">Action</th>
                          </tr>
                      </thead>
                      <tbody class="table-body">
<!--
你在 invoices.component.html 裡寫了：
      *ngFor="let invoice of state?.appData?.data?.page.content"
      這裡的 state?.appData?.data?.page.content 其實是 前端狀態管理 (State) + 後端 API 回傳結構 的組合。讓我拆解一下它的來源：
1. state
      在你的 Component 裡，你有一個 invoiceState$，型別是：
      ts
      Observable<State<CustomHttpResponse<Page<Invoice> & User>>>
      當你在模板裡用 async pipe 訂閱 invoiceState$，就會得到一個 state 物件。
      這個 state 包含：
      dataState → LOADING / LOADED / ERROR 狀態。
      appData → 真正的後端回傳資料。
2. appData
      appData 是 CustomHttpResponse<Page<Invoice> & User>。
      也就是一個自訂的 HTTP 回應包裝，裡面有：
      message（訊息）
      data（真正的資料）
3. data
      在 invoices$ service 方法裡，你定義了：
      ts
      this.http.get<CustomHttpResponse<Page<Invoice> & User>>(`${this.server}/customer/invoice/list?page=${page}`)
      所以 data 的型別是 Page<Invoice> & User。
      這表示 data 裡同時有：
      一個分頁物件 Page<Invoice>
      使用者資訊 User
4. page.content
      Page<T> 介面定義是：
      ts
      export interface Page<T> {
        content: T[];
        totalPages: number;
        totalElements: number;
        numberOfElements: number;
        size: number;
        number: number;
      }
      所以 page.content 就是 Invoice[]，也就是一個發票清單。
      這就是你在模板裡用 *ngFor 迴圈的資料來源。
✅ 總結
      state → 來自你在 Component 裡的 invoiceState$。
      appData → 後端回傳的 CustomHttpResponse。
      data → 後端回傳的主要資料，型別是 Page<Invoice> & User。
      page.content → 分頁物件裡的 Invoice[]，就是你要顯示的發票清單。
      所以 state?.appData?.data?.page.content 的來源是：
      後端 API /customer/invoice/list?page=... → Service invoices$ → Component 狀態管理 → 模板 async pipe → page.content (Invoice[])
-->
                        <tr *ngFor="let invoice of state?.appData?.data?.page.content" class="cell-1">
                            <td>{{ invoice.invoiceNumber }}</td>
                            <td>{{ invoice.services }}</td>
                            <td>
                               <span class="badge"
                                 [ngClass]="[
                                 invoice.status === 'PAID' ? ' bg-success' : '',
                                 invoice.status === 'PENDING' ? ' bg-primary' : '',
                                 invoice.status === 'CANCELED' ? ' bg-danger' : '',
                                 invoice.status === 'OVERDUE' ? ' bg-warning' : '',
                                 ]">
                                 {{ invoice.status }}
                               </span>
                            </td>
<!--
1. invoice.date
      invoice 是你在 *ngFor="let invoice of state?.appData?.data?.page.content" 裡迴圈出來的每一筆發票物件。
      invoice.date 就是這筆發票的日期欄位（通常是後端傳回的 Date 或 ISO 字串）。

2. | date: 'mediumDate'
        | 是 Angular 的 管道 (pipe) 語法。
        date 是 Angular 內建的 日期管道，用來把日期格式化成可讀的字串。
        'mediumDate' 是 Angular 提供的一種預設格式，顯示方式大概是：Feb 27, 2026 （會依照語系不同而略有差異）

3. 常見的日期格式選項
    Angular 的 date pipe 支援多種格式，例如：
      'shortDate' → 2/27/26
      'mediumDate' → Feb 27, 2026
      'longDate' → February 27, 2026
      'fullDate' → Friday, February 27, 2026

你也可以自訂格式，例如 :
  {{ invoice.date | date: 'yyyy-MM-dd' }}   ( 2026-02-27 )
  {{ invoice.date | date: 'dd/MM/yyyy' }}   ( 27/02/2026 )

✅ 總結
{{ invoice.date | date: 'mediumDate' }} 的意思是：
把 invoice.date 這個日期欄位，用 Angular 的日期管道格式化成「中等長度的日期字串」（例如 Feb 27, 2026），然後顯示在畫面上。
-->
                            <td>{{ invoice.date | date: 'mediumDate' }}</td>
                            <td>${{ invoice.total }}</td>
                            <td>
<!--
1. [routerLink]
Angular 提供的指令，用來在模板裡建立一個「路由導向」。
當使用者點擊這個按鈕時，Angular Router 會根據你指定的路徑，導航到對應的頁面。

2. ['/invoices', invoice.id, invoice.invoiceNumber]
這是一個陣列，Angular 會把它組合成路徑。
假設 invoice.id = 5，invoice.invoiceNumber = 'INV-2026-001'，那麼路徑會變成：
/invoices/5/INV-2026-001
這樣就能把發票的 id 和 invoiceNumber 當作路由參數傳遞。

3. 路由設定 (app-routing.module.ts)
要讓這個 routerLink 生效，你必須在路由表裡定義對應的規則，例如：
    const routes: Routes = [
      { path: 'invoices/:id/:invoiceNumber', component: InvoiceDetailComponent }
    ];

    :id 和 :invoiceNumber 是 路由參數 (Route Parameters)。
    當使用者點擊按鈕，Angular Router 會解析 URL，把 id 和 invoiceNumber 傳給 Invoices Component。

✅ 總結
    [routerLink]="['/invoices', invoice.id, invoice.invoiceNumber]" 的作用是：
    點擊按鈕後，導航到 /invoices/{id}/{invoiceNumber} 的路由。
✅  這些值來自 invoice 物件（通常是從 state?.appData?.data?.page.content 迴圈出來的）。✅
    在路由表裡必須定義 path: 'invoices/:id/:invoiceNumber'，目標 Component 才能接收這些參數。
-->
                               <button [routerLink]="['/invoices', invoice.id, invoice.invoiceNumber]" type="button" class="btn btn-info btn-sm">Print</button>
                            </td>
                         </tr>
                      </tbody>
                  </table>

                  <nav *ngIf="state?.appData?.data?.page.content.length > 0" aria-label="Page navigation example">
                     <ul class="pagination justify-content-end">
                        <li [ngClass]="0 == (currentPage$ | async) ? ' disabled' : ''" class="page-item pointer">
                           <a (click)="goToNextOrPreviousPage('backward')" class="page-link">&laquo; Prev</a>
                        </li>
                        <li *ngFor="let pageNumber of [].constructor(state?.appData?.data?.page.totalPages); let i = index;" class="page-item pointer">
                           <a (click)="goToPage(i)" [ngClass]="i == (currentPage$ | async) ? ' active' : ''" class="page-link">
                             {{ i + 1 }}
                           </a>
                        </li>
                        <li [ngClass]="(state?.appData?.data?.page.totalPages - 1) == (currentPage$ | async) ? ' disabled' : ''" class="page-item pointer">
                           <a (click)="goToNextOrPreviousPage('forward')" class="page-link">Next &raquo;</a>
                        </li>
                     </ul>
                  </nav>
                </div>
             </div>
          </div>
       </section>
    </ng-container>
 </ng-container>
